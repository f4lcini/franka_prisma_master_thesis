services:
  fr3_vlm_dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franka_vlm_container
    network_mode: host
    ipc: host
    privileged: true

    tty: true
    stdin_open: true
    
    # --- REAL-TIME REQUIREMENTS FOR LIBFRANKA ---
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    ulimits:
      rtprio: 99
      memlock: -1
    # --------------------------------
    # --------------------------------
    environment:
      - DISPLAY=${DISPLAY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev:rw
      - /dev/bus/usb:/dev/bus/usb:rw
      - /run/udev:/run/udev:ro
      - ./src:/mm_ws/src:rw
      - ./build:/mm_ws/build:rw
      - ./install:/mm_ws/install:rw
      - ./log:/mm_ws/log:rw
